<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentinel2 - R1 UI</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-size: 14px; }
        header { background: #111; padding: 10px; border-bottom: 2px solid #0f0; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-weight: bold; font-size: 1.1em; }
        .status-container { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        #status-bar { font-size: 0.7em; color: #555; }
        
        .main-tabs { display: flex; background: #050505; border-bottom: 1px solid #333; overflow-x: auto; white-space: nowrap; }
        .main-tab-btn { background: transparent; color: #555; border: none; border-bottom: 2px solid transparent; padding: 12px 15px; cursor: pointer; font-family: inherit; font-size: 0.9em; font-weight: bold; }
        .main-tab-btn.active { color: #0f0; border-bottom: 2px solid #0f0; }

        .view-content { display: none; flex: 1; overflow-y: auto; flex-direction: column; position: relative; }
        .view-content.active { display: flex; }

        #chat-window { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 70px; }
        .msg { padding: 10px; border-radius: 4px; max-width: 90%; line-height: 1.4; font-size: 1em; word-wrap: break-word; white-space: pre-wrap; }
        .user { align-self: flex-end; background: #002200; border: 1px solid #0f0; color: #fff; }
        .assistant { align-self: flex-start; background: #111; border: 1px solid #333; color: #0f0; }
        
        .input-wrapper { position: absolute; bottom: 0; left: 0; right: 0; background: #000; border-top: 1px solid #333; display: flex; align-items: center; }
        input[type="text"] { background: transparent; border: none; color: #0f0; padding: 15px 10px; font-family: inherit; outline: none; flex: 1; font-size: 1em; }
        .upload-btn { background: #002200; color: #0f0; border-left: 1px solid #333; padding: 15px; font-weight: bold; white-space: nowrap; }

        .pane-content { padding: 15px; }
        h3 { color: #444; font-size: 0.8em; letter-spacing: 2px; text-transform: uppercase; margin: 15px 0 10px 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        .log-entry { font-size: 0.8em; color: #888; margin-bottom: 5px; border-left: 2px solid #222; padding-left: 5px; word-wrap: break-word; }
        .sub-item { padding: 12px; border-bottom: 1px solid #1a1a1a; color: #777; font-size: 1em; }
        .active-sub { color: #0f0; border-left: 4px solid #0f0; background: #111; }
        
        button { background: #003300; color: #0f0; border: 1px solid #0f0; padding: 12px; cursor: pointer; font-family: inherit; width: 100%; font-weight: bold; margin-bottom: 10px; }
        button:active { background: #0f0; color: #000; }
        .refresh-btn { width: auto; padding: 5px 10px; margin: 0; font-size: 0.8em; }

        select, textarea, input.setup-in { background: #000; color: #0f0; border: 1px solid #333; padding: 12px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 1em; }
        details { background: #0a0a0a; border: 1px solid #222; padding: 10px; margin-bottom: 10px; font-size: 0.9em; }
        summary { cursor: pointer; color: #666; font-weight: bold; }
        pre { white-space: pre-wrap; word-wrap: break-word; color: #888; margin: 8px 0 0 0; font-size: 0.8em; background: #050505; padding: 8px; overflow-x: auto; }
        
        .voice-controls { display: flex; border-bottom: 1px solid #333; }
        .voice-controls button { margin: 0; border-radius: 0; flex: 1; border: none; padding: 15px 5px; font-size: 0.8em; border-right: 1px solid #333; }
        .glow-orb { width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(#0ff, #0066ff); margin: 10px auto; transition: transform 0.05s ease-out; box-shadow: 0 0 15px rgba(0, 150, 255, 0.5); }
    </style>
</head>
<body>
    <header>
        <div class="header-title">SENTINEL</div>
        <div class="status-container">
            <button class="refresh-btn" onclick="refresh()">SYNC</button>
            <span id="status-bar">OFFLINE</span>
        </div>
    </header>

    <div class="main-tabs">
        <button class="main-tab-btn active" onclick="switchMainTab('view-chat')">CHAT</button>
        <button class="main-tab-btn" onclick="switchMainTab('view-voice')">VOICE</button>
        <button class="main-tab-btn" onclick="switchMainTab('view-tasks')">TASKS</button>
        <button class="main-tab-btn" onclick="switchMainTab('view-stats')">STATS</button>
        <button class="main-tab-btn" onclick="switchMainTab('view-logs')">LOGS</button>
        <button class="main-tab-btn" onclick="switchMainTab('view-setup'); loadSetup();">SETUP</button>
    </div>

    <div id="view-chat" class="view-content active">
        <div id="chat-window"></div>
        <div class="input-wrapper">
            <input type="text" id="cmd" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">
            <label for="file-upload" class="upload-btn">[+]</label>
            <input type="file" id="file-upload" style="display: none;" onchange="uploadFile()">
        </div>
    </div>

    <div id="view-voice" class="view-content"><div style="background:#050505;padding:30px 0;"><div class="glow-orb" id="orb"></div></div><div class="voice-controls"><button id="toggle-talk" onclick="toggleTalk()">TALK: OFF</button><button id="toggle-listen" onclick="toggleListen()">LISTEN: OFF</button><button id="kill-voice" onclick="killVoice()">ALL OFF</button></div></div>
    <div id="view-tasks" class="view-content pane-content"><h3>Active Tasks</h3><div id="task-list"></div></div>
    <div id="view-stats" class="view-content pane-content"><h3>System Stats</h3><div id="sys-stats"></div></div>
    <div id="view-logs" class="view-content pane-content"><h3>Subjects</h3><div id="subject-list"></div><h3>Logs</h3><div id="sys-logs"></div></div>
    <div id="view-setup" class="view-content pane-content"><h3>Name</h3><input type="text" id="cfg-name" class="setup-in"><h3>Model</h3><select id="model-select"></select><h3>Brain.md</h3><textarea id="brain-editor" rows="10"></textarea><button onclick="saveSetup()">APPLY</button></div>

    <script>
        // ── Persistence ───────────────────────────────────────────────────────
        var SentinelStorage = {
            save: function() {
                var state = {
                    chatHtml: document.getElementById('chat-window').innerHTML,
                    setup: {
                        name: document.getElementById('cfg-name').value,
                        brain: document.getElementById('brain-editor').value
                    }
                };
                localStorage.setItem('sentinel_data', JSON.stringify(state));
            },
            load: function() {
                try {
                    var data = JSON.parse(localStorage.getItem('sentinel_data') || '{}');
                    if (data.chatHtml) document.getElementById('chat-window').innerHTML = data.chatHtml;
                    if (data.setup) {
                        document.getElementById('cfg-name').value = data.setup.name || '';
                        document.getElementById('brain-editor').value = data.setup.brain || '';
                    }
                } catch(e) { console.error("Load failed", e); }
            }
        };

        // ── UI Logic ──────────────────────────────────────────────────────────
        function switchMainTab(id) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function refresh() {
            try {
                const r = await fetch('/system_stats');
                const d = await r.json();
                document.getElementById('status-bar').innerText = "ONLINE";
                
                // Update chat from server
                const win = document.getElementById('chat-window');
                win.innerHTML = d.chat.map(m => `<div class="msg ${m.role}"><b>${m.role.toUpperCase()}</b><br>${m.content}</div>`).join('');
                
                // Update other UI components
                document.getElementById('sys-stats').innerText = JSON.stringify(d.stats, null, 2);
                
                SentinelStorage.save();
            } catch(e) { 
                document.getElementById('status-bar').innerText = "OFFLINE"; 
            }
        }

        async function send() {
            const el = document.getElementById('cmd'), msg = el.value.trim(); 
            if(!msg) return; 
            el.value = '';
            await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: msg}) });
            refresh();
        }

        function saveSetup() {
            SentinelStorage.save();
            alert("Configuration Saved");
        }

        function loadSetup() { /* placeholder for setup loading logic */ }
        function toggleTalk() {}
        function toggleListen() {}
        function killVoice() {}
        function uploadFile() {}

        // Init
        SentinelStorage.load();
        setInterval(refresh, 5000);
        refresh();
    </script>
</body>
</html>
