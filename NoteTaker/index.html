// ============================================
// Device Controls Library (inline)
// ============================================
class DeviceControls {
  constructor() {
    this.sideButtonEnabled = true;
    this.scrollWheelEnabled = true;
    this.eventListeners = new Map();
  }

  init(options = {}) {
    this.sideButtonEnabled = options.sideButtonEnabled ?? true;
    this.scrollWheelEnabled = options.scrollWheelEnabled ?? true;
    
    if (this.sideButtonEnabled) {
      this.setupSideButtonListener();
    }
    
    if (this.scrollWheelEnabled) {
      this.setupScrollWheelListener();
    }
  }

  setupSideButtonListener() {
    window.addEventListener('sideClick', (event) => {
      if (!this.sideButtonEnabled) return;
      this.handleSideButtonClick(event);
    });
  }

  setupScrollWheelListener() {
    window.addEventListener('scrollUp', (event) => {
      if (!this.scrollWheelEnabled) return;
      this.handleScrollWheel({ direction: 'up', event });
    });
    
    window.addEventListener('scrollDown', (event) => {
      if (!this.scrollWheelEnabled) return;
      this.handleScrollWheel({ direction: 'down', event });
    });
  }

  handleSideButtonClick(event) {
    const handlers = this.eventListeners.get('sideButton') || [];
    handlers.forEach(handler => handler(event));
  }

  handleScrollWheel(data) {
    const handlers = this.eventListeners.get('scrollWheel') || [];
    handlers.forEach(handler => handler({
      direction: data.direction,
      event: data.event
    }));
  }

  on(eventType, handler) {
    if (!this.eventListeners.has(eventType)) {
      this.eventListeners.set(eventType, []);
    }
    this.eventListeners.get(eventType).push(handler);
  }

  off(eventType, handler) {
    const handlers = this.eventListeners.get(eventType) || [];
    const index = handlers.indexOf(handler);
    if (index > -1) {
      handlers.splice(index, 1);
    }
  }

  setSideButtonEnabled(enabled) {
    this.sideButtonEnabled = enabled;
  }

  setScrollWheelEnabled(enabled) {
    this.scrollWheelEnabled = enabled;
  }

  triggerSideButton() {
    const event = new CustomEvent('sideClick', {
      detail: { source: 'programmatic' }
    });
    window.dispatchEvent(event);
  }
}

const deviceControls = new DeviceControls();

// ============================================
// Flutter Channel Communication Library (inline)
// ============================================
class FlutterChannel {
  constructor() {
    this.isFlutterAvailable = this.checkFlutterAvailability();
    this.setupPluginMessageHandler();
  }

  checkFlutterAvailability() {
    return typeof window !== 'undefined' && 
           (window.FlutterButtonHandler !== undefined || 
            window.closeWebView !== undefined ||
            window.PluginMessageHandler !== undefined ||
            window.TouchEventHandler !== undefined);
  }

  setupPluginMessageHandler() {
    if (typeof window !== 'undefined' && !window.onPluginMessage) {
      window.onPluginMessage = function(data) {
        window.dispatchEvent(new CustomEvent('pluginMessage', { 
          detail: data 
        }));
      };
    }
  }

  sendMessage(message) {
    console.warn('flutterChannel.sendMessage() is deprecated. Use PluginMessageHandler.postMessage() instead');
    
    if (window.PluginMessageHandler) {
      try {
        const payload = {
          message: typeof message === 'string' ? message : JSON.stringify(message)
        };
        window.PluginMessageHandler.postMessage(JSON.stringify(payload));
        return true;
      } catch (error) {
        console.error('Failed to send message:', error);
        return false;
      }
    }
    
    if (window.FlutterButtonHandler) {
      try {
        const messageStr = typeof message === 'string' ? message : JSON.stringify(message);
        window.FlutterButtonHandler.postMessage(messageStr);
        return true;
      } catch (error) {
        console.error('Failed to send message to Flutter:', error);
        return false;
      }
    }
    
    console.warn('No message handler available');
    return false;
  }

  sendPluginMessage(messageObj) {
    if (!window.PluginMessageHandler) {
      console.warn('PluginMessageHandler not available');
      return false;
    }

    if (typeof messageObj !== 'object' || !messageObj.message) {
      console.error('PluginMessage must be an object with a "message" field');
      return false;
    }

    try {
      window.PluginMessageHandler.postMessage(JSON.stringify(messageObj));
      return true;
    } catch (error) {
      console.error('Failed to send plugin message to Flutter:', error);
      return false;
    }
  }

  sendTouchEvent(touchData) {
    if (!window.TouchEventHandler) {
      console.warn('TouchEventHandler not available');
      return false;
    }

    if (!touchData || typeof touchData.x !== 'number' || typeof touchData.y !== 'number' || !touchData.type) {
      console.error('Touch event must have x, y coordinates and type');
      return false;
    }

    try {
      window.TouchEventHandler.postMessage(JSON.stringify(touchData));
      return true;
    } catch (error) {
      console.error('Failed to send touch event to Flutter:', error);
      return false;
    }
  }

  closeWebView() {
    if (window.closeWebView) {
      window.closeWebView.postMessage('');
      return true;
    }
    console.warn('closeWebView not available');
    return false;
  }

  onPluginMessage(callback) {
    if (typeof window === 'undefined') return;
    window.addEventListener('pluginMessage', (event) => {
      callback(event.detail);
    });
  }

  onSideClick(callback) {
    if (typeof window === 'undefined') return;
    window.addEventListener('sideClick', callback);
  }
}

// ============================================
// UI Design Library (inline)
// ============================================
class UIDesign {
  constructor() {
    this.screenWidth = 240;
    this.screenHeight = 320;
    this.aspectRatio = 3/4;
    this.baseUnit = 'vw';
  }

  pxToVw(px) {
    return ((px / this.screenWidth) * 100) + this.baseUnit;
  }

  getFontSizes() {
    return {
      title: '12.5vw',
      large: '10vw',
      body: '8.33vw',
      small: '6.25vw',
      tiny: '5vw'
    };
  }

  getSpacing() {
    return {
      xs: '1.25vw',
      sm: '2.5vw',
      md: '3.33vw',
      lg: '5vw',
      xl: '7.5vw',
      xxl: '10vw'
    };
  }

  getButtonSizes() {
    return {
      wide: { width: '80vw', height: '15vw', fontSize: '8.33vw' },
      standard: { width: '45vw', height: '15vw', fontSize: '8.33vw' },
      small: { width: '30vw', height: '12vw', fontSize: '6.25vw' },
      round: { width: '20vw', height: '20vw', borderRadius: '50%' }
    };
  }

  createContainer(element, options = {}) {
    const defaults = {
      width: '100vw',
      height: '133.33vw',
      background: '#000000',
      padding: this.getSpacing().md
    };
    const settings = { ...defaults, ...options };
    Object.assign(element.style, {
      width: settings.width,
      height: settings.height,
      background: settings.background,
      padding: settings.padding,
      boxSizing: 'border-box',
      position: 'relative',
      overflow: 'hidden'
    });
  }

  createButton(button, options = {}) {
    const sizes = this.getButtonSizes();
    const defaults = {
      type: 'wide',
      background: '#FE5F00',
      color: '#FFFFFF',
      borderRadius: '50vw',
      active: true
    };
    const settings = { ...defaults, ...options };
    const size = sizes[settings.type] || sizes.standard;
    Object.assign(button.style, {
      width: size.width,
      height: size.height,
      fontSize: size.fontSize || this.getFontSizes().body,
      background: settings.active ? settings.background : '#333333',
      color: settings.color,
      border: 'none',
      borderRadius: settings.borderRadius,
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      cursor: 'pointer',
      fontWeight: 'bold',
      transition: 'all 0.2s ease',
      userSelect: 'none',
      WebkitTapHighlightColor: 'transparent'
    });
    button.addEventListener('touchstart', () => {
      button.style.transform = 'scale(0.95)';
    });
    button.addEventListener('touchend', () => {
      button.style.transform = 'scale(1)';
    });
  }

  createText(element, options = {}) {
    const fonts = this.getFontSizes();
    const defaults = {
      size: 'body',
      color: '#FFFFFF',
      align: 'center',
      weight: 'normal'
    };
    const settings = { ...defaults, ...options };
    Object.assign(element.style, {
      fontSize: fonts[settings.size] || settings.size,
      color: settings.color,
      textAlign: settings.align,
      fontWeight: settings.weight,
      lineHeight: '1.2',
      margin: '0',
      padding: '0'
    });
  }

  createGrid(container, options = {}) {
    const defaults = {
      columns: 2,
      gap: this.getSpacing().md,
      alignItems: 'center',
      justifyItems: 'center'
    };
    const settings = { ...defaults, ...options };
    Object.assign(container.style, {
      display: 'grid',
      gridTemplateColumns: 'repeat(' + settings.columns + ', 1fr)',
      gap: settings.gap,
      alignItems: settings.alignItems,
      justifyItems: settings.justifyItems,
      width: '100%',
      height: '100%'
    });
  }

  getColors() {
    return {
      background: '#000000',
      primary: '#FE5F00',
      secondary: '#FFFFFF',
      disabled: '#333333',
      text: { primary: '#FFFFFF', secondary: '#CCCCCC', disabled: '#666666' },
      status: { success: '#00FF00', error: '#FF0000', warning: '#FFAA00', info: '#0099FF' }
    };
  }

  setupViewport() {
    var viewport = document.querySelector('meta[name="viewport"]');
    if (!viewport) {
      viewport = document.createElement('meta');
      viewport.name = 'viewport';
      document.head.appendChild(viewport);
    }
    viewport.content = 'width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no';
  }

  transition(fromElement, toElement, type, duration) {
    type = type || 'slide';
    duration = duration || 300;
    switch (type) {
      case 'slide':
        this.slideTransition(fromElement, toElement, duration);
        break;
      case 'fade':
        this.fadeTransition(fromElement, toElement, duration);
        break;
      case 'none':
        fromElement.style.display = 'none';
        toElement.style.display = 'block';
        break;
    }
  }

  slideTransition(fromElement, toElement, duration) {
    toElement.style.display = 'block';
    toElement.style.transform = 'translateX(100%)';
    toElement.style.transition = 'transform ' + duration + 'ms ease-in-out';
    fromElement.style.transition = 'transform ' + duration + 'ms ease-in-out';
    setTimeout(function() {
      fromElement.style.transform = 'translateX(-100%)';
      toElement.style.transform = 'translateX(0)';
    }, 10);
    setTimeout(function() {
      fromElement.style.display = 'none';
      fromElement.style.transform = '';
      fromElement.style.transition = '';
      toElement.style.transition = '';
    }, duration + 10);
  }

  fadeTransition(fromElement, toElement, duration) {
    toElement.style.display = 'block';
    toElement.style.opacity = '0';
    toElement.style.transition = 'opacity ' + duration + 'ms ease-in-out';
    fromElement.style.transition = 'opacity ' + duration + 'ms ease-in-out';
    setTimeout(function() {
      fromElement.style.opacity = '0';
      toElement.style.opacity = '1';
    }, 10);
    setTimeout(function() {
      fromElement.style.display = 'none';
      fromElement.style.opacity = '';
      fromElement.style.transition = '';
      toElement.style.transition = '';
    }, duration + 10);
  }
}

// State Management
var notes = [];
var currentNoteId = null;
var isRecording = false;
var pendingAIRequest = false;

var MAX_PHOTO_WIDTH = 800;
var MAX_PHOTO_QUALITY = 0.7;

// ============================================
// Storage (FIXED - matching Food Tracker pattern)
// ============================================
async function saveNotes() {
  try {
    if (window.creationStorage) {
      var encoded = btoa(JSON.stringify(notes));
      await window.creationStorage.plain.setItem('r1_notes', encoded);
    } else {
      localStorage.setItem('r1_notes', JSON.stringify(notes));
    }
  } catch (e) {
    console.error('Save error:', e);
  }
}

async function loadNotes() {
  try {
    if (window.creationStorage) {
      var stored = await window.creationStorage.plain.getItem('r1_notes');
      if (stored) {
        notes = JSON.parse(atob(stored));
      }
    } else {
      var stored = localStorage.getItem('r1_notes');
      if (stored) notes = JSON.parse(stored);
    }
  } catch (e) {
    console.error('Load error:', e);
    notes = [];
  }
}

  'offically': 'officially', 'parliment': 'parliament', 'particulary': 'particularly',
  'posession': 'possession', 'prefered': 'preferred', 'proffesional': 'professional',
  'realy': 'really', 'refered': 'referred', 'religous': 'religious',
  'remeber': 'remember', 'resistence': 'resistance', 'shedule': 'schedule',
  'succesful': 'successful', 'suprise': 'surprise', 'tommorow': 'tomorrow',
  'tounge': 'tongue', 'truely': 'truly', 'unfortunatly': 'unfortunately',
  'wether': 'whether', 'writting': 'writing', 'thier': 'their',
  'alot': 'a lot', 'doesnt': "doesn't", 'dont': "don't", 'wont': "won't",
  'cant': "can't", 'shouldnt': "shouldn't", 'wouldnt': "wouldn't",
  'im': "I'm", 'ive': "I've", 'youre': "you're", 'theyre': "they're",
  'arent': "aren't", 'isnt': "isn't", 'wasnt': "wasn't", 'didnt': "didn't"
};

function spellCheck(text) {
  var corrected = text;
  var corrections = [];
  var words = text.split(/(\s+)/);

  for (var i = 0; i < words.length; i++) {
    var word = words[i].toLowerCase().replace(/[.,!?;:'"()]/g, '');
    if (COMMON_MISSPELLINGS[word]) {
      var original = words[i];
      var punctMatch = original.match(/[.,!?;:'"()]+$/);
      var punctuation = punctMatch ? punctMatch[0] : '';
      var cleanWord = original.replace(/[.,!?;:'"()]/g, '');
      var suggestion = COMMON_MISSPELLINGS[word];
      var capitalized = cleanWord[0] === cleanWord[0].toUpperCase()
        ? suggestion.charAt(0).toUpperCase() + suggestion.slice(1)
        : suggestion;
      words[i] = capitalized + punctuation;
      corrections.push('"' + cleanWord + '" \u2192 "' + capitalized + '"');
    }
  }

  corrected = words.join('');
  return { corrected: corrected, corrections: corrections };
}

// ============================================
// ICS Calendar File Generation
// ============================================
function generateICS(note) {
  var now = new Date();
  var uid = 'r1note-' + note.id + '@r1device';
  var formatDate = function(d) { return d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, ''); };

  var dtstart, dtend;
  if (note.reminderType === 'allday') {
    var dateStr = note.reminderDate.replace(/-/g, '');
    dtstart = 'DTSTART;VALUE=DATE:' + dateStr;
    dtend = 'DTEND;VALUE=DATE:' + dateStr;
  } else {
    var dt = new Date(note.reminderDate + 'T' + (note.reminderTime || '09:00'));
    var endDt = new Date(dt.getTime() + 60 * 60 * 1000);
    dtstart = 'DTSTART:' + formatDate(dt);
    dtend = 'DTEND:' + formatDate(endDt);
  }

  return [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//R1Notes//EN',
    'BEGIN:VEVENT',
    'UID:' + uid,
    'DTSTAMP:' + formatDate(now),
    dtstart,
    dtend,
    'SUMMARY:' + (note.subject || 'Note Reminder'),
    'DESCRIPTION:' + (note.body || '').replace(/\n/g, '\\n').substring(0, 200),
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');
}

// ============================================
// Email (FIXED - using PluginMessageHandler for R1)
// ============================================
function sendEmail(note) {
  var subject = note.subject || 'Note from R1';
  var body = note.body || '';

  if (note.reminderType !== 'none' && note.reminderDate) {
    body += '\n\n--- Reminder ---\n';
    if (note.reminderType === 'allday') {
      body += 'All Day: ' + note.reminderDate;
    } else {
      body += 'Date/Time: ' + note.reminderDate + ' ' + (note.reminderTime || '');
    }
    body += '\n\nNote: A calendar .ics file would be attached. Save it to add this event to your calendar.';
    body += '\n\n--- ICS Content (copy to .ics file) ---\n';
    body += generateICS(note);
  }

  // Use PluginMessageHandler on R1 device (don't include photo data URLs - too large)
  if (typeof PluginMessageHandler !== 'undefined') {
    PluginMessageHandler.postMessage(JSON.stringify({
      type: 'email',
      subject: subject,
      body: body
    }));
  } else {
    // Fallback for browser testing - use mailto (without photos)
    var encodedSubject = encodeURIComponent(subject);
    var encodedBody = encodeURIComponent(body);
    var mailto = 'mailto:?subject=' + encodedSubject + '&body=' + encodedBody;
    window.location.href = mailto;
  }
}

// ============================================
// View Management
// ============================================
function showView(viewId) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById(viewId).classList.add('active');
}

// ============================================
// Note List Rendering
// ============================================
function renderNotesList(notesToRender) {
  var list = document.getElementById('notes-list');
  var items = notesToRender || notes;

  if (items.length === 0) {
    list.innerHTML = '<div class="empty-state">No notes yet.<br>Tap \uFF0B or press side button to create one.</div>';
    return;
  }

  var sorted = items.slice().sort(function(a, b) { return b.updatedAt - a.updatedAt; });
  list.innerHTML = sorted.map(function(note) {
    var date = new Date(note.updatedAt).toLocaleDateString();
    var reminderHtml = '';
    if (note.reminderType === 'allday' && note.reminderDate) {
      reminderHtml = '<div class="note-item-reminder">\uD83D\uDCC5 ' + note.reminderDate + ' (All Day)</div>';
    } else if (note.reminderType === 'datetime' && note.reminderDate) {
      reminderHtml = '<div class="note-item-reminder">\u23F0 ' + note.reminderDate + ' ' + (note.reminderTime || '') + '</div>';
    }
    var photoCount = (note.photos && note.photos.length > 0) ? '<div class="note-item-photos">\uD83D\uDCF7 ' + note.photos.length + ' photo' + (note.photos.length > 1 ? 's' : '') + '</div>' : '';
    return '<div class="note-item" data-id="' + note.id + '">' +
      '<div class="note-item-subject">' + escapeHtml(note.subject || 'Untitled') + '</div>' +
      '<div class="note-item-meta">' + date + '</div>' +
      reminderHtml +
      photoCount +
    '</div>';
  }).join('');

  list.querySelectorAll('.note-item').forEach(function(el) {
    el.addEventListener('click', function() { openNote(el.dataset.id); });
  });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================
// Note CRUD
// ============================================
function createNote() {
  var note = {
    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
    subject: '',
    body: '',
    photos: [],
    reminderType: 'none',
    reminderDate: '',
    reminderTime: '',
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  notes.push(note);
  openNote(note.id);
}

function openNote(id) {
  var note = notes.find(function(n) { return n.id === id; });
  if (!note) return;
  currentNoteId = id;

  document.getElementById('note-subject').value = note.subject || '';
  document.getElementById('note-body').value = note.body || '';
  document.getElementById('reminder-type').value = note.reminderType || 'none';
  document.getElementById('reminder-date').value = note.reminderDate || '';
  document.getElementById('reminder-time').value = note.reminderTime || '';

  if (!note.photos) note.photos = [];
  renderPhotos(note.photos);
  updateReminderFields();
  showView('view-editor');
}

function saveCurrentNote() {
  if (!currentNoteId) return;
  var note = notes.find(function(n) { return n.id === currentNoteId; });
  if (!note) return;

  note.subject = document.getElementById('note-subject').value.trim();
  note.body = document.getElementById('note-body').value;
  note.reminderType = document.getElementById('reminder-type').value;
  note.reminderDate = document.getElementById('reminder-date').value;
  note.reminderTime = document.getElementById('reminder-time').value;
  note.updatedAt = Date.now();

  saveNotes();
  renderNotesList();
}

// ============================================
// Photo Management
// ============================================
function renderPhotos(photos) {
  var grid = document.getElementById('photos-grid');
  if (!photos || photos.length === 0) {
    grid.innerHTML = '';
    return;
  }
  grid.innerHTML = photos.map(function(dataUrl, idx) {
    return '<div class="photo-thumb">' +
      '<img src="' + dataUrl + '" alt="Photo ' + (idx + 1) + '">' +
      '<button class="photo-remove" data-idx="' + idx + '">\u00D7</button>' +
    '</div>';
  }).join('');

  grid.querySelectorAll('.photo-remove').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      removePhoto(parseInt(btn.dataset.idx));
    });
  });
}

function removePhoto(idx) {
  var note = notes.find(function(n) { return n.id === currentNoteId; });
  if (!note || !note.photos) return;
  note.photos.splice(idx, 1);
  renderPhotos(note.photos);
  saveNotes();
}

function compressAndAddPhoto(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var w = img.width;
      var h = img.height;
      if (w > MAX_PHOTO_WIDTH) {
        h = Math.round(h * (MAX_PHOTO_WIDTH / w));
        w = MAX_PHOTO_WIDTH;
      }
      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL('image/jpeg', MAX_PHOTO_QUALITY);

      var note = notes.find(function(n) { return n.id === currentNoteId; });
      if (!note) return;
      if (!note.photos) note.photos = [];
      note.photos.push(dataUrl);
      renderPhotos(note.photos);
      saveNotes();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function handlePhotoInput(event) {
  var files = event.target.files;
  if (!files || files.length === 0) return;
  for (var i = 0; i < files.length; i++) {
    compressAndAddPhoto(files[i]);
  }
  event.target.value = '';
}

function deleteCurrentNote() {
  if (!currentNoteId) return;
  if (!confirm('Delete this note?')) return;
  notes = notes.filter(function(n) { return n.id !== currentNoteId; });
  currentNoteId = null;
  saveNotes();
  renderNotesList();
  showView('view-list');
}

// ============================================
// Reminder Fields Toggle
// ============================================
function updateReminderFields() {
  var type = document.getElementById('reminder-type').value;
  var fields = document.getElementById('reminder-fields');
  var timeInput = document.getElementById('reminder-time');

  if (type === 'none') {
    fields.classList.add('hidden');
  } else {
    fields.classList.remove('hidden');
    if (type === 'datetime') {
      timeInput.classList.remove('hidden');
    } else {
      timeInput.classList.add('hidden');
    }
  }
}

// ============================================
// Search
// ============================================
function performSearch() {
  var query = document.getElementById('search-input').value.trim().toLowerCase();
  var dateFilter = document.getElementById('search-date').value;
  var resultsEl = document.getElementById('search-results');

  var results = notes;

  if (query) {
    results = results.filter(function(n) {
      return (n.subject || '').toLowerCase().indexOf(query) !== -1 ||
        (n.body || '').toLowerCase().indexOf(query) !== -1;
    });
  }

  if (dateFilter) {
    results = results.filter(function(n) { return n.reminderDate === dateFilter; });
  }

  if (results.length === 0) {
    resultsEl.innerHTML = '<div class="empty-state">No notes found.</div>';
    return;
  }

  var sorted = results.slice().sort(function(a, b) { return b.updatedAt - a.updatedAt; });
  resultsEl.innerHTML = sorted.map(function(note) {
    var date = new Date(note.updatedAt).toLocaleDateString();
    var reminderHtml = '';
    if (note.reminderType !== 'none' && note.reminderDate) {
      reminderHtml = '<div class="note-item-reminder">\uD83D\uDCC5 ' + note.reminderDate + '</div>';
    }
    return '<div class="note-item" data-id="' + note.id + '">' +
      '<div class="note-item-subject">' + escapeHtml(note.subject || 'Untitled') + '</div>' +
      '<div class="note-item-meta">' + date + '</div>' +
      reminderHtml +
    '</div>';
  }).join('');

  resultsEl.querySelectorAll('.note-item').forEach(function(el) {
    el.addEventListener('click', function() { openNote(el.dataset.id); });
  });
}

// ============================================
// Voice Recording (STT)
// ============================================
function toggleVoiceRecording() {
  var btn = document.getElementById('btn-voice');
  if (!isRecording) {
    isRecording = true;
    btn.classList.add('recording');
    btn.textContent = '\u23F9 Stop';
    if (typeof CreationVoiceHandler !== 'undefined') {
      CreationVoiceHandler.postMessage('start');
    } else {
      console.log('CreationVoiceHandler not available - simulating');
    }
  } else {
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '\uD83C\uDFA4 Voice';
    if (typeof CreationVoiceHandler !== 'undefined') {
      CreationVoiceHandler.postMessage('stop');
    }
  }
}

// ============================================
// AI Integration
// ============================================
function sendToAI() {
  var body = document.getElementById('note-body');
  var text = body.value.trim();
  if (!text) {
    alert('Write a question in the note body first.');
    return;
  }

  var lines = text.split('\n');
  var lastLine = lines[lines.length - 1].trim();
  var question = lastLine || text;

  pendingAIRequest = true;
  body.value += '\n\nUSER: ' + question + '\nAI: (thinking...)';

  if (typeof PluginMessageHandler !== 'undefined') {
    PluginMessageHandler.postMessage(JSON.stringify({
      message: 'Answer this question concisely in 1-2 sentences: ' + question,
      useLLM: true
    }));
  } else {
    setTimeout(function() {
      handleAIResponse('AI response not available in browser mode.');
    }, 1000);
  }
}

function handleAIResponse(response) {
  if (!pendingAIRequest) return;
  pendingAIRequest = false;

  var body = document.getElementById('note-body');
  body.value = body.value.replace('AI: (thinking...)', 'AI: ' + response);
  saveCurrentNote();
}

// ============================================
// Plugin Message Handler
// ============================================
window.onPluginMessage = function(data) {
  // Handle STT transcript
  if (data.type === 'sttEnded' && data.transcript) {
    var body = document.getElementById('note-body');
    if (body && document.getElementById('view-editor').classList.contains('active')) {
      var current = body.value;
      body.value = current + (current ? ' ' : '') + data.transcript;
      saveCurrentNote();
    }
    isRecording = false;
    var btn = document.getElementById('btn-voice');
    if (btn) {
      btn.classList.remove('recording');
      btn.textContent = '\uD83C\uDFA4 Voice';
    }
    return;
  }

  // Handle AI/LLM response
  if (pendingAIRequest) {
    var response = '';
    if (data.data) {
      try {
        var parsed = typeof data.data === 'string' ? JSON.parse(data.data) : data.data;
        response = parsed.message || parsed.response || parsed.text || JSON.stringify(parsed);
      } catch (e) {
        response = data.data;
      }
    } else if (data.message) {
      response = data.message;
    }
    if (response) {
      handleAIResponse(response);
    }
  }
};

// ============================================
// Hardware Events
// ============================================
window.addEventListener('sideClick', function() {
  var editorView = document.getElementById('view-editor');
  if (editorView.classList.contains('active')) return;
  createNote();
});

window.addEventListener('longPressStart', function() {
  if (document.getElementById('view-editor').classList.contains('active')) {
    if (typeof CreationVoiceHandler !== 'undefined') {
      isRecording = true;
      var btn = document.getElementById('btn-voice');
      if (btn) {
        btn.classList.add('recording');
        btn.textContent = '\u23F9 Stop';
      }
      CreationVoiceHandler.postMessage('start');
    }
  }
});

window.addEventListener('longPressEnd', function() {
  if (isRecording) {
    isRecording = false;
    var btn = document.getElementById('btn-voice');
    if (btn) {
      btn.classList.remove('recording');
      btn.textContent = '\uD83C\uDFA4 Voice';
    }
    if (typeof CreationVoiceHandler !== 'undefined') {
      CreationVoiceHandler.postMessage('stop');
    }
  }
});

window.addEventListener('scrollUp', function() {});
window.addEventListener('scrollDown', function() {});

// ============================================
// Initialization
// ============================================
document.addEventListener('DOMContentLoaded', async function() {
  await loadNotes();
  renderNotesList();

  // Navigation buttons
  document.getElementById('btn-new').addEventListener('click', createNote);
  document.getElementById('btn-search').addEventListener('click', function() { showView('view-search'); });
  document.getElementById('btn-search-back').addEventListener('click', function() {
    showView('view-list');
    renderNotesList();
  });
  document.getElementById('btn-editor-back').addEventListener('click', function() {
    saveCurrentNote();
    currentNoteId = null;
    showView('view-list');
    renderNotesList();
  });

  // Photo button
  document.getElementById('btn-photo').addEventListener('click', function() {
    document.getElementById('photo-input').click();
  });
  document.getElementById('photo-input').addEventListener('change', handlePhotoInput);

  // Editor actions
  document.getElementById('btn-save').addEventListener('click', function() {
    saveCurrentNote();
    alert('Saved!');
  });
  document.getElementById('btn-delete').addEventListener('click', deleteCurrentNote);
  document.getElementById('btn-voice').addEventListener('click', toggleVoiceRecording);
  document.getElementById('btn-ai').addEventListener('click', sendToAI);
  document.getElementById('btn-email').addEventListener('click', function() {
    var note = notes.find(function(n) { return n.id === currentNoteId; });
    if (note) {
      saveCurrentNote();
      sendEmail(note);
    }
  });
  document.getElementById('btn-spell').addEventListener('click', function() {
    var body = document.getElementById('note-body');
    var result = spellCheck(body.value);
    if (result.corrections.length > 0) {
      body.value = result.corrected;
      alert('Fixed ' + result.corrections.length + ' word(s):\n' + result.corrections.join('\n'));
      saveCurrentNote();
    } else {
      alert('No spelling errors found.');
    }
  });

  // Reminder type change
  document.getElementById('reminder-type').addEventListener('change', updateReminderFields);

  // Search
  document.getElementById('btn-do-search').addEventListener('click', performSearch);

  // Keyboard fallback for development
  if (typeof PluginMessageHandler === 'undefined') {
    window.addEventListener('keydown', function(event) {
      if (event.code === 'Space' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'SELECT') {
        event.preventDefault();
        window.dispatchEvent(new CustomEvent('sideClick'));
      }
    });
  }
});
