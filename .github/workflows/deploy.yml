name: Deploy Multi-Vite Projects to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Unified Deployment Directory
        run: mkdir -p ./final_site

      # --- BUILD RC RACING ---
      - name: Build RC Racing
        run: |
          cd "RC Racing"
          npm install
          npm run build
          cp -r dist ../final_site/"RC Racing"

      # --- BUILD PROG 2 ---
      - name: Build CalorieCounter
        run: |
          cd CalorieCounter
          npm install
          npm run build
          cp -r dist ../final_site/CalorieCounter

          # --- CalorieCounter2 ---
      - name: Build and Copy CalorieCounter2
        run: |
          mkdir -p ./final_site/CalorieCounter2
          cp -r CalorieCounter2/* ./final_site/CalorieCounter2/

      # --- BUILD PROG 3 ---
      - name: Build OldCountryMusic
        run: |
          cd OldCountryMusic
          npm install
          npm run build
          cp -r dist ../final_site/OldCountryMusic
          cp youtube.html ../final_site/OldCountryMusic/

      # --- COPY SENTINEL CHAT ---
      - name: Prepare Sentinel Chat
        run: |
          mkdir -p ./final_site/sentinelchat
          cp -r sentinelchat/* ./final_site/sentinelchat/    

      # --- VeilbreakWard ---
      - name: VeilbreakWard
        run: |
          mkdir -p ./final_site/VeilbreakWard
          cp -r VeilbreakWard/* ./final_site/VeilbreakWard/  

      # --- R1 Platformer ---
      - name: Build and Copy R1 Platformer
        run: |
          mkdir -p ./final_site/R1Platformer
          cp -r R1Platformer/* ./final_site/R1Platformer/  
      # --- Note Taker2 ---
      - name: Build and Copy R1 NoteTaker
        run: |
          mkdir -p ./final_site/NoteTaker
          cp -r NoteTaker/* ./final_site/NoteTaker/

      # --- CREATE A ROOT HOME PAGE ---
      - name: Create Landing Page Index
        run: |
          echo '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>My R1 Apps</title><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:40px;background:#f5f5f7;color:#333;max-width:800px;margin:0 auto}h1{color:#111;border-bottom:2px solid #e5e5e5;padding-bottom:10px;margin-bottom:30px}.app-container{display:flex;gap:20px;flex-wrap:wrap}.app-card{background:#fff;border:1px solid #e1e4e8;border-radius:12px;padding:20px;width:240px;text-align:center;box-shadow:0 4px 6px rgba(0,0,0,.05);transition:transform .2s,box-shadow .2s}.app-card:hover{transform:translateY(-4px);box-shadow:0 8px 12px rgba(0,0,0,.1)}.app-icon{width:180px;height:180px;object-fit:contain;border-radius:8px;margin-bottom:15px;background:#fafafa}.app-link{display:inline-block;font-size:1.1rem;font-weight:600;color:#0066cc;text-decoration:none;margin-top:5px}.app-link:hover{text-decoration:underline}</style></head><body><h1>My R1 Apps</h1><div class="app-container"><div class="app-card"><img class="app-icon" src="https://github.com/betolley/Rabbit_R1/blob/main/QRCodes/RCRacerQR.png?raw=true"><br><a class="app-link" href="RC%20Racing/">RC Racing Game</a></div><div class="app-card"><img class="app-icon" src="https://github.com/betolley/Rabbit_R1/blob/main/QRCodes/CalorieCounterQR.png?raw=true"><br><a class="app-link" href="CalorieCounter/">CalorieCounter</a></div><div class="app-card"><img class="app-icon" src="https://github.com/betolley/Rabbit_R1/blob/main/QRCodes/CalorieCounter2QR.png?raw=true"><br><a class="app-link" href="CalorieCounter2/">CalorieCounter 2</a></div><div class="app-card"><img class="app-icon" src="https://raw.githubusercontent.com/betolley/Rabbit_R1/refs/heads/main/QRCodes/OldCountryMusicQR.png"><br><a class="app-link" href="OldCountryMusic/">OldCountryMusic</a></div><div class="app-card"><img class="app-icon" src="https://github.com/betolley/Rabbit_R1/blob/main/QRCodes/SentinelChatQR.png?raw=true"><br><a class="app-link" href="sentinelchat/">Sentinel Chat</a></div><div class="app-card"><img class="app-icon" src="https://github.com/betolley/Rabbit_R1/blob/main/QRCodes/VeilbreakWardQR.png?raw=true"><br><a class="app-link" href="VeilbreakWard/">Veilbreak Ward</a></div><div class="app-card"><img class="app-icon" src="https://github.com/betolley/Rabbit_R1/blob/main/QRCodes/R1PlatformerQR.png?raw=true"><br><a class="app-link" href="R1Platformer/index.html">R1 Platformer</a></div></div></body></html>' > ./final_site/index.html           

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./final_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
