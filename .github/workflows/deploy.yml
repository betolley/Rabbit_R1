name: Deploy Multi-Vite Projects to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Unified Deployment Directory
        run: mkdir -p ./final_site

      # --- BUILD RC RACING ---
      - name: Build RC Racing
        run: |
          cd "RC Racing"
          npm install
          npm run build
          cp -r dist ../final_site/"RC Racing"

      # --- BUILD PROG 2 ---
      - name: Build CalorieCounter
        run: |
          cd CalorieCounter
          npm install
          npm run build
          cp -r dist ../final_site/CalorieCounter

      # --- CREATE A ROOT HOME PAGE ---
      - name: Create Landing Page Index
        run: |
          if [ ! -f ./final_site/index.html ]; then
            echo '<!DOCTYPE html><html><head><title>My R1 Apps</title></head><body style="font-family:sans-serif; padding:40px;"><h1>RC Racer</h1><ul><li><a href="RC%20Racing/">RC Racing Game</a></li><li><a href="CalorieCounter/">CalorieCounter</a></li></ul></body></html>' > ./final_site/index.html
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./final_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
