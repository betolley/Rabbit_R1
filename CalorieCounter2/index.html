<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=282, user-scalable=no, initial-scale=1.0">
    <title>Rabbit Food Tracker</title>
    <style>
        /* CSS Reset & Variable Definitions */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        :root { --bg-color: #000000; --primary-color: #00FF88; --border-gray: #333333; --text-light: #FFFFFF; --text-gray: #888888; }
        html, body { width: 240px; height: 282px; background-color: var(--bg-color); color: var(--text-light); font-family: sans-serif; font-size: 11px; overflow: hidden; }
        #app { width: 240px; height: 282px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        #header { display: flex; align-items: center; justify-content: space-between; padding: 8px 8px 4px 8px; height: 40px; }
        #date-display { font-size: 15px; font-weight: 700; color: var(--primary-color); }
        .circle-btn { width: 26px; height: 26px; border-radius: 50%; background: #1c1c1e; border: 1px solid var(--border-gray); color: var(--text-light); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #mic-btn { background: var(--primary-color); color: #000; border: none; }
        #mic-btn.recording { background: #FF3B30; color: #fff; }
        #totals { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border-gray); padding-bottom: 6px; margin: 0 8px; }
        .macro-item { display: flex; flex-direction: column; align-items: center; }
        .macro-value { font-size: 14px; font-weight: 800; color: var(--primary-color); }
        .macro-label { font-size: 7px; color: var(--text-gray); text-transform: uppercase; }
        #meal-tabs { display: flex; background: #0d0d0d; border-bottom: 1px solid var(--border-gray); height: 22px; }
        .meal-tab { flex: 1; text-align: center; line-height: 22px; font-size: 8px; color: var(--text-gray); cursor: pointer; }
        .meal-tab.active { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); }
        #food-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
        .food-entry { padding: 6px 4px; border-bottom: 1px solid #141414; }
        .food-row { display: flex; align-items: center; justify-content: space-between; }
        .food-name { font-size: 10px; font-weight: 600; }
        .food-macros { display: flex; gap: 6px; font-size: 8px; color: var(--text-gray); }
        #camera-modal { position: absolute; top: 0; left: 0; width: 240px; height: 282px; background: #000; z-index: 200; display: flex; flex-direction: column; }
        #camera-stream { width: 240px; height: 180px; object-fit: cover; }
        .camera-controls { height: 102px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; background: #0d0d0d; }
        .rect-btn { background: #1c1c1e; border: 1px solid var(--border-gray); color: var(--text-light); padding: 6px 12px; border-radius: 4px; font-size: 9px; }
        .hidden { display: none !important; }
        .overlay { position: absolute; top: 0; left: 0; width: 240px; height: 282px; background: rgba(0, 0, 0, 0.95); z-index: 300; display: flex; flex-direction: column; padding: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">
            <div id="date-display">Today</div>
            <div style="display:flex; gap:4px;">
                <button class="circle-btn" onclick="openCamera()">📷</button>
                <button class="circle-btn" id="mic-btn">🎤</button>
            </div>
        </div>
        <div id="totals">
            <div class="macro-item"><span class="macro-value" id="total-cal">0</span><span class="macro-label">Cal</span></div>
            <div class="macro-item"><span class="macro-value" id="total-protein">0g</span><span class="macro-label">Prot</span></div>
            <div class="macro-item"><span class="macro-value" id="total-carbs">0g</span><span class="macro-label">Carb</span></div>
            <div class="macro-item"><span class="macro-value" id="total-fat">0g</span><span class="macro-label">Fat</span></div>
        </div>
        <div id="meal-tabs">
            <div class="meal-tab active" onclick="switchMealTab('breakfast')" id="tab-breakfast">Breakfast</div>
            <div class="meal-tab" onclick="switchMealTab('lunch')" id="tab-lunch">Lunch</div>
            <div class="meal-tab" onclick="switchMealTab('supper')" id="tab-supper">Supper</div>
        </div>
        <div id="food-list"></div>
        <div id="status-bar" style="height:18px; font-size:8px; display:flex; align-items:center; justify-content:center;">Ready</div>

        <div id="camera-modal" class="hidden">
            <video id="camera-stream" autoplay playsinline muted></video>
            <div class="camera-controls">
                <div style="display:flex; gap:10px;">
                    <label><input type="radio" name="scan-type" value="food" checked> Food</label>
                    <label><input type="radio" name="scan-type" value="nutrition"> Nutrition</label>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="rect-btn" onclick="closeCamera()">Cancel</button>
                    <button class="rect-btn" onclick="capturePhoto()" style="background:var(--primary-color); color:#000;">Analyze</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let trackerData = {}; 
        let currentDate = new Date();
        let selectedMealTab = 'breakfast';
        let pendingPhoto = null;
        let aiTimeout = null;

        function startAITimer() {
            clearTimeout(aiTimeout);
            aiTimeout = setTimeout(() => { showErrorPopup("Request Timed Out"); }, 15000);
        }

        function showErrorPopup(text) { alert(text); }

        window.onPluginMessage = function(payload) {
            // New logic: Check if payload contains the JSON, ignoring image data
            let messageContent = typeof payload === 'string' ? payload : JSON.stringify(payload);
            
            // 1. Filter out STT events
            if (messageContent.includes('"sttStarted"') || messageContent.includes('"sttEnded"')) return;

            // 2. Look for JSON in the message
            const jsonMatch = messageContent.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
                clearTimeout(aiTimeout);
                try {
                    const parsed = JSON.parse(jsonMatch[0]);
                    if (parsed.foods && Array.isArray(parsed.foods)) {
                        handleParsedAIResponse(parsed);
                    } else {
                        showErrorPopup("Valid JSON, but no 'foods' array found.");
                    }
                } catch (e) {
                    showErrorPopup("Parsing Error: " + e.message);
                }
            } else {
                showErrorPopup("No valid JSON found in response.");
            }
        };

        function handleParsedAIResponse(obj) {
            obj.foods.forEach(food => {
                const dateStr = currentDate.toISOString().split('T')[0];
                if (!trackerData[dateStr]) trackerData[dateStr] = {};
                if (!trackerData[dateStr][selectedMealTab]) trackerData[dateStr][selectedMealTab] = [];
                trackerData[dateStr][selectedMealTab].push(food);
            });
            updateUI();
        }

        async function openCamera() {
            document.getElementById('camera-modal').classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('camera-stream').srcObject = stream;
        }

        function closeCamera() {
            document.getElementById('camera-stream').srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('camera-modal').classList.add('hidden');
        }

        function capturePhoto() {
            const video = document.getElementById('camera-stream');
            const canvas = document.createElement('canvas');
            canvas.width = 300; canvas.height = 300;
            canvas.getContext('2d').drawImage(video, 0, 0, 300, 300);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.5);
            closeCamera();
            startAITimer();
            
            // Post to system
            PluginMessageHandler.postMessage(JSON.stringify({
                message: "Analyze this image and return JSON: {\"foods\":[{\"name\":\"\",\"calories\":0,\"protein\":0,\"carbs\":0,\"fat\":0}]}",
                image: dataUrl
            }));
        }
        
        function updateUI() { /* Add UI rendering logic here */ }
        function switchMealTab(m) { selectedMealTab = m; updateUI(); }
    </script>
</body>
</html>
