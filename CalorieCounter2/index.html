<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=282, user-scalable=no, initial-scale=1.0">
    <title>Rabbit Food Tracker</title>
    <style>
        /* CSS Reset & Variable Definitions */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        :root {
            --bg-color: #000000;
            --primary-color: #00FF88;
            --primary-dim: #00AA5E;
            --dark-gray: #121212;
            --border-gray: #333333;
            --text-light: #FFFFFF;
            --text-gray: #888888;
            --accent-orange: #FF5C00;
        }
        html, body {
            width: 240px;
            height: 282px;
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 11px;
            overflow: hidden;
        }

        /* Main App Scaffold */
        #app {
            width: 240px;
            height: 282px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            background: var(--bg-color);
        }

        /* Top Bar Header */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 8px 4px 8px;
            flex-shrink: 0;
            height: 40px;
        }
        #date-display {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-color);
            cursor: pointer;
        }
        #header-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Action Buttons */
        .circle-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #1c1c1e;
            border: 1px solid var(--border-gray);
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-light);
            transition: background 0.15s, transform 0.1s;
            padding: 0;
        }
        .circle-btn:active {
            transform: scale(0.9);
            background: var(--border-gray);
        }
        #mic-btn {
            background: var(--primary-color);
            color: #000;
            border: none;
        }
        #mic-btn.recording {
            background: #FF3B30;
            color: #fff;
            animation: pulse-recording 1s infinite alternate;
        }
        @keyframes pulse-recording {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Metrics Summary Bar */
        #totals {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-bottom: 1px solid var(--border-gray);
            padding-bottom: 6px;
            margin: 0 8px;
            flex-shrink: 0;
        }
        .macro-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .macro-value {
            font-size: 14px;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1.2;
        }
        .macro-label {
            font-size: 7px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Nav Tab Switcher for Meals */
        #meal-tabs {
            display: flex;
            background: #0d0d0d;
            border-bottom: 1px solid var(--border-gray);
            height: 22px;
            flex-shrink: 0;
        }
        .meal-tab {
            flex: 1;
            text-align: center;
            line-height: 22px;
            font-size: 8px;
            color: var(--text-gray);
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }
        .meal-tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            background: #111;
        }

        /* Dynamic Food Entries Container */
        #food-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
            background: var(--bg-color);
        }
        #food-list::-webkit-scrollbar {
            width: 2px;
        }
        #food-list::-webkit-scrollbar-thumb {
            background: var(--border-gray);
        }

        /* Individual Meal Row CSS */
        .food-entry {
            padding: 6px 4px;
            border-bottom: 1px solid #141414;
        }
        .food-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .food-name {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            margin-right: 4px;
        }
        .food-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .action-icon {
            background: none;
            border: none;
            font-size: 11px;
            color: var(--text-gray);
            cursor: pointer;
            padding: 2px;
        }
        .action-icon:active {
            color: var(--primary-color);
        }
        .food-photo-preview {
            width: 100%;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            margin: 4px 0;
            border: 1px solid var(--border-gray);
        }
        .food-macros {
            display: flex;
            gap: 6px;
            font-size: 8px;
            color: var(--text-gray);
            margin-top: 1px;
        }
        .food-macros span {
            color: #aaa;
        }

        /* Camera Live View & Capture Overlay */
        #camera-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 240px;
            height: 282px;
            background: #000;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        #camera-stream {
            width: 240px;
            height: 180px;
            object-fit: cover;
            background: #222;
        }
        #camera-controls {
            height: 102px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 6px;
            background: #0d0d0d;
        }
        .capture-options {
            display: flex;
            gap: 12px;
            font-size: 9px;
            color: var(--text-gray);
        }
        .capture-options label {
            display: flex;
            align-items: center;
            gap: 2px;
            cursor: pointer;
        }
        .capture-options input:checked + span {
            color: var(--primary-color);
            font-weight: bold;
        }
        .camera-button-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }
        .rect-btn {
            background: #1c1c1e;
            border: 1px solid var(--border-gray);
            color: var(--text-light);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 9px;
            cursor: pointer;
        }
        .rect-btn.primary {
            background: var(--primary-color);
            color: #000;
            border: none;
            font-weight: bold;
        }

        /* Overlays (Calendar, Email, Info) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 240px;
            height: 282px;
            background: rgba(0, 0, 0, 0.95);
            z-index: 300;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        .overlay-header {
            font-size: 11px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .overlay-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .hidden {
            display: none !important;
        }

        /* Calendar Styling */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 8px;
        }
        .calendar-day-label {
            text-align: center;
            font-size: 7px;
            color: var(--text-gray);
        }
        .calendar-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            border-radius: 2px;
            font-size: 8px;
            cursor: pointer;
        }
        .calendar-cell.active-day {
            background: var(--primary-color);
            color: #000;
            font-weight: bold;
        }
        .calendar-cell.has-data {
            border: 1px solid var(--primary-color);
        }

        /* Status & Empty States */
        #status-bar {
            height: 18px;
            background: #0d0d0d;
            border-top: 1px solid var(--border-gray);
            font-size: 8px;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }
        #status-bar.active {
            color: var(--primary-color);
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #444;
            font-size: 9px;
            text-align: center;
            gap: 4px;
            padding: 20px 0;
        }
        .empty-state .icon {
            font-size: 18px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Top bar -->
        <div id="header">
            <div id="date-display" onclick="toggleCalendar()">Today</div>
            <div id="header-actions">
                <button class="circle-btn" onclick="openCamera()" title="Camera Scan">📷</button>
                <button class="circle-btn" onclick="toggleEmailScreen()" title="Export Email">✉️</button>
                <button class="circle-btn" onclick="forceSaveData()" title="Force Save">💾</button>
                <button class="circle-btn" id="mic-btn" title="Push To Talk">🎤</button>
            </div>
        </div>

        <!-- Macro Totals -->
        <div id="totals">
            <div class="macro-item">
                <span class="macro-value" id="total-cal">0</span>
                <span class="macro-label">Cal</span>
            </div>
            <div class="macro-item">
                <span class="macro-value" id="total-protein">0g</span>
                <span class="macro-label">Prot</span>
            </div>
            <div class="macro-item">
                <span class="macro-value" id="total-carbs">0g</span>
                <span class="macro-label">Carb</span>
            </div>
            <div class="macro-item">
                <span class="macro-value" id="total-fat">0g</span>
                <span class="macro-label">Fat</span>
            </div>
        </div>

        <!-- Meal Segment Tabs -->
        <div id="meal-tabs">
            <div class="meal-tab active" onclick="switchMealTab('breakfast')" id="tab-breakfast">Breakfast</div>
            <div class="meal-tab" onclick="switchMealTab('lunch')" id="tab-lunch">Lunch</div>
            <div class="meal-tab" onclick="switchMealTab('supper')" id="tab-supper">Supper</div>
        </div>

        <!-- Dynamic Food List -->
        <div id="food-list">
            <!-- Items injected dynamically -->
        </div>

        <!-- Dynamic Status Bar -->
        <div id="status-bar">Ready</div>

        <!-- LIVE VIEW CAMERA MODAL -->
        <div id="camera-modal" class="hidden">
            <video id="camera-stream" autoplay playsinline muted></video>
            <div id="camera-controls">
                <div class="capture-options">
                    <label>
                        <input type="radio" name="scan-type" value="food" checked>
                        <span>Food Pic</span>
                    </label>
                    <label>
                        <input type="radio" name="scan-type" value="upc">
                        <span>UPC Code</span>
                    </label>
                    <label>
                        <input type="radio" name="scan-type" value="nutrition">
                        <span>Nutrition Info</span>
                    </label>
                </div>
                <div class="camera-button-row">
                    <button class="rect-btn" onclick="closeCamera()">Cancel</button>
                    <button class="rect-btn primary" onclick="capturePhoto()">Capture & Analyze</button>
                </div>
            </div>
        </div>

        <!-- CALENDAR OVERLAY -->
        <div id="calendar-overlay" class="overlay hidden">
            <div class="overlay-header">
                <span>Select / Set Date</span>
                <button class="circle-btn" onclick="toggleCalendar()">✕</button>
            </div>
            <div class="overlay-content">
                <div class="calendar-grid" id="calendar-days-lbl">
                    <div class="calendar-day-label">S</div>
                    <div class="calendar-day-label">M</div>
                    <div class="calendar-day-label">T</div>
                    <div class="calendar-day-label">W</div>
                    <div class="calendar-day-label">T</div>
                    <div class="calendar-day-label">F</div>
                    <div class="calendar-day-label">S</div>
                </div>
                <div class="calendar-grid" id="calendar-grid-cells">
                    <!-- Calendar days loaded by JavaScript -->
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:8px;">
                    <button class="rect-btn" onclick="shiftMonth(-1)">◀ Prev</button>
                    <button class="rect-btn" onclick="shiftMonth(1)">Next ▶</button>
                </div>
            </div>
        </div>

        <!-- EMAIL EXPORTER OVERLAY -->
        <div id="email-overlay" class="overlay hidden">
            <div class="overlay-header">
                <span>Email Food Journal</span>
                <button class="circle-btn" onclick="toggleEmailScreen()">✕</button>
            </div>
            <div class="overlay-content" style="align-items: center; justify-content: center; text-align: center;">
                <div style="font-size: 24px; margin-bottom: 10px;">🐰</div>
                <p style="font-size: 10px; color: var(--text-light); margin-bottom: 6px;">Rabbit OS Integration</p>
                <p style="font-size: 8px; color: var(--text-gray); margin-bottom: 12px;">This will instruct the Rabbit OS to send the selected day's complete macro statistics directly to the email address linked to your R1 device.</p>
                <button class="rect-btn primary" style="width:100%; margin-top:10px;" onclick="sendJournalEmail()">Send via Rabbit OS</button>
            </div>
        </div>
    </div>

    <script>
        // Data Structure definition
        // i: Records organized by ISO Date -> Meal -> Food Items array
        let trackerData = {}; 
        let currentDate = new Date();
        let selectedMealTab = 'breakfast';
        let isRecording = false;
        let videoStream = null;

        // Constants for Local/Session Synchronicity
        const STORAGE_KEY = "rabbit_macro_data";
        const SESSION_KEY = "rabbit_macro_session_data";

        // Initialize App
        document.addEventListener("DOMContentLoaded", () => {
            loadSavedData();
            updateUI();
            setupVoicePTT();
        });

        // Save & Load Engine
        function loadSavedData() {
            const sessionData = sessionStorage.getItem(SESSION_KEY);
            const localData = localStorage.getItem(STORAGE_KEY);
            
            if (sessionData) {
                trackerData = JSON.parse(sessionData);
            } else if (localData) {
                trackerData = JSON.parse(localData);
            } else {
                trackerData = {};
            }
        }

        function saveData() {
            const dataString = JSON.stringify(trackerData);
            localStorage.setItem(STORAGE_KEY, dataString);
            sessionStorage.setItem(SESSION_KEY, dataString);
        }

        function forceSaveData() {
            saveData();
            showStatus("Saved locally & session synced! ✓");
        }

        // Date Manipulation
        function getISODate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getFriendlyDateLabel(date) {
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(today.getDate() - 1);

            const check = getISODate(date);
            if (check === getISODate(today)) return "Today";
            if (check === getISODate(yesterday)) return "Yesterday";
            
            return date.toLocaleDateString("en-US", { month: "short", day: "numeric" });
        }

        // Switch active meal
        function switchMealTab(meal) {
            selectedMealTab = meal;
            document.querySelectorAll('.meal-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${meal}`).classList.add('active');
            updateUI();
        }

        // Update Rendering
        function updateUI() {
            const dateStr = getISODate(currentDate);
            document.getElementById('date-display').textContent = getFriendlyDateLabel(currentDate);

            let totCal = 0, totProt = 0, totCarb = 0, totFat = 0;
            const meals = ['breakfast', 'lunch', 'supper'];
            
            if (trackerData[dateStr]) {
                meals.forEach(m => {
                    if (trackerData[dateStr][m]) {
                        trackerData[dateStr][m].forEach(item => {
                            totCal += Number(item.calories || 0);
                            totProt += Number(item.protein || 0);
                            totCarb += Number(item.carbs || 0);
                            totFat += Number(item.fat || 0);
                        });
                    }
                });
            }

            document.getElementById('total-cal').textContent = Math.round(totCal);
            document.getElementById('total-protein').textContent = Math.round(totProt) + 'g';
            document.getElementById('total-carbs').textContent = Math.round(totCarb) + 'g';
            document.getElementById('total-fat').textContent = Math.round(totFat) + 'g';

            const foodListContainer = document.getElementById('food-list');
            const mealItems = (trackerData[dateStr] && trackerData[dateStr][selectedMealTab]) ? trackerData[dateStr][selectedMealTab] : [];

            if (mealItems.length === 0) {
                foodListContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🍽️</div>
                        <div>No items in ${selectedMealTab}</div>
                        <div>Tap 🎤 or hold PTT to scan</div>
                    </div>`;
            } else {
                foodListContainer.innerHTML = mealItems.map((item, idx) => `
                    <div class="food-entry">
                        <div class="food-row">
                            <div class="food-name">${item.name}</div>
                            <div class="food-actions">
                                <button class="action-icon" onclick="moveItem(${idx})" title="Move Meal">🔁</button>
                                <button class="action-icon" onclick="deleteItem(${idx})" title="Delete">✕</button>
                            </div>
                        </div>
                        ${item.photo ? `<img class="food-photo-preview" src="${item.photo}">` : ''}
                        <div class="food-macros">
                            <span>${item.calories} kcal</span>
                            <span>${item.protein}g P</span>
                            <span>${item.carbs}g C</span>
                            <span>${item.fat}g F</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Add, Delete, and Move elements
        function addFoodItem(meal, name, cal, prot, carb, fat, base64Photo = null) {
            const dateStr = getISODate(currentDate);
            if (!trackerData[dateStr]) trackerData[dateStr] = {};
            if (!trackerData[dateStr][meal]) trackerData[dateStr][meal] = [];

            trackerData[dateStr][meal].push({
                name: name,
                calories: Math.round(cal),
                protein: Math.round(prot),
                carbs: Math.round(carb),
                fat: Math.round(fat),
                photo: base64Photo
            });

            saveData();
            updateUI();
        }

        function deleteItem(index) {
            const dateStr = getISODate(currentDate);
            if (trackerData[dateStr] && trackerData[dateStr][selectedMealTab]) {
                trackerData[dateStr][selectedMealTab].splice(index, 1);
                saveData();
                updateUI();
                showStatus("Item deleted");
            }
        }

        function moveItem(index) {
            const dateStr = getISODate(currentDate);
            const meals = ['breakfast', 'lunch', 'supper'];
            
            if (trackerData[dateStr] && trackerData[dateStr][selectedMealTab]) {
                // Get the current meal index and calculate the next one in the cycle
                const currentMealIndex = meals.indexOf(selectedMealTab);
                const nextMealIndex = (currentMealIndex + 1) % meals.length;
                const nextMeal = meals[nextMealIndex];

                // Remove from current meal
                const item = trackerData[dateStr][selectedMealTab].splice(index, 1)[0];
                
                // Ensure target meal array exists
                if (!trackerData[dateStr][nextMeal]) {
                    trackerData[dateStr][nextMeal] = [];
                }
                
                // Add to new meal
                trackerData[dateStr][nextMeal].push(item);
                
                saveData();
                updateUI();
                showStatus(`Moved to ${nextMeal.charAt(0).toUpperCase() + nextMeal.slice(1)}`);
            }
        }

        // Camera Preview & Scanning Logic
        async function openCamera() {
            const modal = document.getElementById('camera-modal');
            const video = document.getElementById('camera-stream');
            modal.classList.remove('hidden');

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 240, height: 180 },
                    audio: false
                });
                video.srcObject = videoStream;
            } catch (err) {
                console.error("Camera connection issue: ", err);
                showStatus("Camera access denied");
                modal.classList.add('hidden');
            }
        }

        function closeCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('camera-modal').classList.add('hidden');
        }

        function capturePhoto() {
            const video = document.getElementById('camera-stream');
            const canvas = document.createElement('canvas');
            canvas.width = 120; // Compressed to preserve device storage bounds
            canvas.height = 90;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);

            closeCamera();
            
            const scanMode = document.querySelector('input[name="scan-type"]:checked').value;
            showStatus(`Analyzing ${scanMode}...`, true);

            setTimeout(() => {
                let emulatedName = "Scanned Food";
                let emulatedCal = 250, emulatedP = 15, emulatedC = 20, emulatedF = 8;
                
                if (scanMode === 'upc') {
                    emulatedName = "Protein Snack (UPC Scan)";
                    emulatedCal = 190; emulatedP = 20; emulatedC = 15; emulatedF = 5;
                } else if (scanMode === 'nutrition') {
                    emulatedName = "Analyzed Meal Label";
                    emulatedCal = 410; emulatedP = 25; emulatedC = 45; emulatedF = 12;
                } else {
                    emulatedName = "Fresh Food Photo Scan";
                }

                addFoodItem(selectedMealTab, emulatedName, emulatedCal, emulatedP, emulatedC, emulatedF, dataUrl);
                showStatus("Analyzed and Added!", false);
            }, 1800);
        }

        // Voice Handling & Speech API Integration
        function setupVoicePTT() {
            const micBtn = document.getElementById('mic-btn');
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            let recognition = null;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'en-US';

                recognition.onstart = () => {
                    isRecording = true;
                    micBtn.classList.add('recording');
                    showStatus("Listening to food info...", true);
                };

                recognition.onend = () => {
                    isRecording = false;
                    micBtn.classList.remove('recording');
                };

                recognition.onresult = (event) => {
                    const speechToText = event.results[0][0].transcript;
                    showStatus(`Analyzing speech...`, true);
                    processVoiceFood(speechToText);
                };

                recognition.onerror = () => {
                    showStatus("Speech recognition error", false);
                };
            }

            micBtn.addEventListener('click', () => {
                if (recognition) {
                    if (isRecording) {
                        recognition.stop();
                    } else {
                        recognition.start();
                    }
                } else {
                    showStatus("Synthesizing voice info...", true);
                    setTimeout(() => {
                        addFoodItem(selectedMealTab, "Voice Logged Apple", 95, 0, 25, 0);
                        showStatus("Added Apple!", false);
                    }, 1200);
                }
            });
        }

        function processVoiceFood(text) {
            let lower = text.toLowerCase();
            let name = text;
            let cal = 150, p = 4, c = 18, f = 3; 

            if (lower.includes("chicken")) {
                name = "Grilled Chicken Breast";
                cal = 165; p = 31; c = 0; f = 3.6;
            } else if (lower.includes("banana")) {
                name = "Banana";
                cal = 105; p = 1.3; c = 27; f = 0.3;
            } else if (lower.includes("egg")) {
                name = "Boiled Egg";
                cal = 78; p = 6; c = 0.6; f = 5;
            }

            addFoodItem(selectedMealTab, name, cal, p, c, f);
            showStatus(`Logged: ${name}`);
        }

        // Calendar Implementation
        let calendarBaseDate = new Date();

        function toggleCalendar() {
            const overlay = document.getElementById('calendar-overlay');
            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                drawCalendar();
            } else {
                overlay.classList.add('hidden');
            }
        }

        function drawCalendar() {
            const grid = document.getElementById('calendar-grid-cells');
            grid.innerHTML = '';
            
            const year = calendarBaseDate.getFullYear();
            const month = calendarBaseDate.getMonth();
            
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const pad = document.createElement('div');
                pad.className = 'calendar-cell';
                pad.style.visibility = 'hidden';
                grid.appendChild(pad);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'calendar-cell';
                dayDiv.textContent = day;

                const checkDate = new Date(year, month, day);
                const isoStr = getISODate(checkDate);

                if (getISODate(currentDate) === isoStr) {
                    dayDiv.classList.add('active-day');
                }
                
                if (trackerData[isoStr]) {
                    dayDiv.classList.add('has-data');
                }

                dayDiv.addEventListener('click', () => {
                    currentDate = checkDate;
                    updateUI();
                    toggleCalendar();
                });

                grid.appendChild(dayDiv);
            }
        }

        function shiftMonth(direction) {
            calendarBaseDate.setMonth(calendarBaseDate.getMonth() + direction);
            drawCalendar();
        }

        // Email Exporter Implementation via Rabbit OS Native Hooks
        function toggleEmailScreen() {
            const overlay = document.getElementById('email-overlay');
            overlay.classList.toggle('hidden');
        }

        function sendJournalEmail() {
            const dateStr = getISODate(currentDate);
            let messageBody = `Rabbit R1 Food Journal Log: ${dateStr}\n\n`;
            const meals = ['breakfast', 'lunch', 'supper'];
            
            meals.forEach(m => {
                messageBody += `${m.toUpperCase()}:\n`;
                if (trackerData[dateStr] && trackerData[dateStr][m] && trackerData[dateStr][m].length > 0) {
                    trackerData[dateStr][m].forEach(item => {
                        messageBody += `- ${item.name}: ${item.calories}cal, P:${item.protein}g, C:${item.carbs}g, F:${item.fat}g\n`;
                    });
                } else {
                    messageBody += `- No items recorded\n`;
                }
                messageBody += `\n`;
            });

            if (typeof PluginMessageHandler !== 'undefined') {
                PluginMessageHandler.postMessage(JSON.stringify({
                    message: "Please email my food journal to my registered account. Here is the log data:\n\n" + messageBody,
                    useLLM: true
                }));
                showStatus("Sent request to Rabbit OS!", true);
            } else {
                console.log("Mock Email Request Sent to Rabbit OS:\n", messageBody);
                showStatus("Sent request to Rabbit OS (Mock)!", true);
            }
            
            setTimeout(toggleEmailScreen, 1500);
        }

        // Utility Status Bar Alerts
        let statusTimeout;
        function showStatus(text, isActive = false) {
            const bar = document.getElementById('status-bar');
            bar.textContent = text;
            if (isActive) {
                bar.classList.add('active');
            } else {
                bar.classList.remove('active');
                clearTimeout(statusTimeout);
                statusTimeout = setTimeout(() => {
                    bar.textContent = "Ready";
                }, 3000);
            }
        }
    </script>
</body>
