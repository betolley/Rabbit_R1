<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=282, user-scalable=no, initial-scale=1.0">
    <title>Macro Tracker</title>
  <script type="module" crossorigin src="./assets/main-NFD0ryuz.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/main-C7wI1G5b.css">
</head>
<body>
    <div id="app">
        <div id="header">
            <div id="date-display"></div>
            <div id="header-actions">
                <button id="open-btn" aria-label="Open">📂</button>
                <button id="save-btn" aria-label="Save">💾</button>
                <button id="mic-btn" aria-label="Log food">🎤</button>
            </div>
        </div>

        <div id="totals">
            <div class="macro-item">
                <span class="macro-value" id="total-cal">0</span>
                <span class="macro-label">Cal</span>
            </div>
            <div class="macro-item">
                <span class="macro-value" id="total-protein">0</span>
                <span class="macro-label">Protein</span>
            </div>
            <div class="macro-item">
                <span class="macro-value" id="total-carbs">0</span>
                <span class="macro-label">Carbs</span>
            </div>
            <div class="macro-item">
                <span class="macro-value" id="total-fat">0</span>
                <span class="macro-label">Fat</span>
            </div>
        </div>

        <div id="food-list"></div>

        <div id="status-bar"></div>
    </div>

    <div id="day-picker-overlay" class="overlay hidden">
        <div id="day-picker">
            <div id="day-picker-header">Saved Days</div>
            <div id="day-picker-list"></div>
            <button id="day-picker-close">Close</button>
        </div>
    </div>

    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
</body>
</html>
