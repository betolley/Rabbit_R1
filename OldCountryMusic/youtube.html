<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Playlist</title>
    <style>
        /* This centers the video player perfectly on the blank page */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* Dark background to match the video player */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>

    <iframe 
        width="560" 
        height="315" 
        src="https://www.youtube.com/embed/videoseries?si=UJm717zK36BhPqQh&amp;list=PLYluSfNh3SDtVZXJEENQbvYwBPj4yHieM" 
        title="YouTube video player" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen>
    </iframe>

</body>
</html>
